<!DOCTYPE html>
<html lang="es">

<head>
    <title>Counter</title>

    <script>
        let counter = 0
        function count() {
            let heading = document.querySelector('h1')
            counter++
            heading.innerHTML = counter

        }
        document.querySelector('button').onclick = count

    </script>
</head>

<body>
    <h1>0</h1>
    <button>Count</button>
</body>

</html>
